<body style="background:#080a12;color:white" class="min-h-screen">
<div class="bg-[#12131f] border-b border-white/10 p-4 flex justify-between items-center sticky top-0 z-40">

</div>
<button id="publishBtn" onclick="publish()" class="w-full bg-[#e50914] py-3 rounded-full font-black">Publish to Separate Repo CastNoodles</button>
</div>
<div id="movieList" class="mt-6 space-y-2"></div>
</div>
<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full font-bold z-50"></div>
<script>
let blobId=localStorage.getItem('castnoodles_separate_blobId')||"1400000000000000001"; let allMovies=[]; let posterBase64="";

async function save(){try{await fetch('https://jsonblob.com/api/jsonBlob/'+blobId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(allMovies)}); localStorage.setItem('castnoodles_separate_backup',JSON.stringify(allMovies));}catch(e){}}

<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAST NOODLES CREATOR - Repo Flix - Free + VIP</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background:#080a12;color:white" class="min-h-screen">
<div class="bg-[#12131f] border-b border-yellow-500/20 p-4 flex justify-between items-center sticky top-0 z-40">
<div class="flex items-center gap-2 flex-wrap"><b class="text-white">CAST</b><b style="color:#e50914">NOODLES</b><span class="text-white/60 text-sm">CREATOR</span><span class="text-[10px] bg-green-500 text-black px-2 py-0.5 rounded-full font-black">FREE</span><span class="text-[10px] bg-yellow-400 text-black px-2 py-0.5 rounded-full font-black">VIP PAY</span><span id="blobInfo" class="text-[10px] ml-2 px-2 py-0.5 rounded-full bg-white/10">Loading...</span><span class="text-[10px] bg-[#e50914] px-2 py-0.5 rounded-full font-bold">Repo: Flix</span></div>
<div class="flex gap-2"><button onclick="window.open('https://sonivalopez-hue.github.io/Flix/','_blank')" class="bg-white text-black px-4 py-2 rounded-full text-xs font-black">View Main Repo</button><button onclick="forcePush()" class="bg-yellow-400 text-black px-4 py-2 rounded-full text-xs font-black">Force Push</button></div>
</div>
<div class="max-w-7xl mx-auto p-4">
<div class="bg-gradient-to-r from-[#e50914]/20 via-green-500/10 to-yellow-400/20 border border-white/10 p-4 rounded-2xl mb-6">
<b>🍜 CAST NOODLES CREATOR - Repo Linked:</b> <a href="https://sonivalopez-hue.github.io/Flix/" target="_blank" class="text-yellow-400 underline">https://sonivalopez-hue.github.io/Flix/</a><br>
<span class="text-xs text-white/70"><span class="text-green-400 font-bold">FREE</span> = Ordinary watch for free (No pay) | <span class="text-yellow-400 font-bold">VIP PAY</span> = Pay before download & watch - Just like Flixlit!</span>
</div>
<div class="bg-[#151821] rounded-2xl p-5 border border-white/10">
<h2 class="font-black mb-4">Upload - Choose Free or VIP Pay</h2>
<input id="title" placeholder="Title * e.g Noodles Cooking" class="w-full bg-black border border-white/10 rounded-full px-4 py-3 mb-2 text-sm">
<div class="flex gap-2 mb-2"><input id="year" placeholder="Year" class="w-1/2 bg-black border border-white/10 rounded-full px-4 py-3 text-sm"><select id="genre" class="w-1/2 bg-black border border-white/10 rounded-full px-4 py-3 text-sm"><option>Action</option><option>Nollywood</option><option>Comedy</option><option>Cooking</option><option>Cast Noodles</option></select></div>
<input id="posterFile" type="file" accept="image/*" class="w-full text-xs mb-2"><div id="posterPreview" class="hidden"><img id="posterImg" class="w-full h-40 object-cover rounded-xl mb-2"></div>
<input id="videoLink" placeholder="https:// permanent link - @getpubliclink_bot" class="w-full bg-black border border-white/10 rounded-full px-4 py-3 text-xs mb-3">
<div class="grid grid-cols-2 gap-2 mb-4">
<label class="bg-green-500/10 border-2 border-green-500/30 p-3 rounded-xl cursor-pointer flex gap-2"><input id="freeCheck" type="radio" name="vip" checked onchange="toggleVip()"><div><p class="text-xs font-black text-green-400">FREE - Ordinary</p><p class="text-[10px] text-white/60">Watch for free</p></div></label>
<label class="bg-yellow-400/10 border-2 border-yellow-500/20 p-3 rounded-xl cursor-pointer flex gap-2"><input id="vipCheck" type="radio" name="vip" onchange="toggleVip()"><div><p class="text-xs font-black text-yellow-400">VIP PAY</p><p class="text-[10px] text-white/60">Pay before watch</p></div></label>
</div>
<div id="vipHint" class="bg-green-500/10 border border-green-500/20 p-2 rounded-lg mb-3 text-[11px] text-green-300">FREE selected: Watch for free!</div>
<button id="publishBtn" onclick="publish()" class="w-full bg-[#e50914] py-3 rounded-full font-black">Publish to Flix Repo</button>
</div>
<div id="movieList" class="mt-6 space-y-2"></div>
</div>
<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full font-bold z-50"></div>
<script>
let blobId=localStorage.getItem('castnoodles_blobId')||localStorage.getItem('flixhub_blobId')||"1400000000000000001"; let allMovies=[]; let posterBase64="";
function toggleVip(){let isVip=document.getElementById('vipCheck').checked; document.getElementById('vipHint').innerText=isVip?'VIP PAY: Pay before download & watch!':'FREE: Watch for free!';}
async function load(){try{let r=await fetch('https://jsonblob.com/api/jsonBlob/'+blobId); if(r.ok){let d=await r.json(); if(Array.isArray(d)) allMovies=d;}}catch(e){} render();}
async function save(){try{await fetch('https://jsonblob.com/api/jsonBlob/'+blobId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(allMovies)}); localStorage.setItem('castnoodles_backup',JSON.stringify(allMovies));}catch(e){}}
document.getElementById('posterFile').addEventListener('change',e=>{let f=e.target.files[0]; if(!f) return; let r=new FileReader(); r.onload=ev=>{let img=new Image(); img.onload=()=>{let c=document.createElement('canvas'); c.width=400; c.height=img.height*400/img.width; c.getContext('2d').drawImage(img,0,0,c.width,c.height); posterBase64=c.toDataURL('image/jpeg',0.6); document.getElementById('posterImg').src=posterBase64; document.getElementById('posterPreview').classList.remove('hidden');}; img.src=ev.target.result;}; r.readAsDataURL(f);});
function render(){document.getElementById('movieList').innerHTML=allMovies.map((m,i)=>`<div class="bg-[#151821] p-3 rounded-xl flex gap-3"><div class="w-12 h-12 bg-red-600 rounded flex items-center justify-center">${m.title[0]}</div><div class="flex-1"><p class="text-sm font-bold">${m.title} ${m.vip?'<span class="bg-yellow-400 text-black text-[9px] px-2 rounded-full">VIP PAY</span>':'<span class="bg-green-500 text-black text-[9px] px-2 rounded-full">FREE</span>'}</p><p class="text-xs text-white/50">${m.vip?'Pay Before Watch':'Watch Free'}</p></div><button onclick="allMovies.splice(${i},1);save();render()" class="text-red-400 text-xs">Del</button></div>`).join('');}
async function publish(){let t=document.getElementById('title').value.trim(); let y=document.getElementById('year').value.trim()||'2024'; let g=document.getElementById('genre').value; let v=document.getElementById('videoLink').value.trim(); let vip=document.getElementById('vipCheck').checked; if(!t||!posterBase64||!v){alert('Need title, poster, link');return;} let m={id:Date.now(),title:t,year:y,genre:g,type:'movie',poster:posterBase64,video:v,vip:vip}; allMovies.unshift(m); await save(); render(); alert(vip?'VIP Published to https://sonivalopez-hue.github.io/Flix/':'Free Published to https://sonivalopez-hue.github.io/Flix/');}
function forcePush(){if(confirm('Force push?')){fetch('https://jsonblob.com/api/jsonBlob',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(allMovies)}).then(r=>r.headers.get('location')).then(loc=>{if(loc){let id=loc.split('/').pop(); localStorage.setItem('castnoodles_blobId',id); alert('New Blob: '+id);}});}}
load();
</script>
</body></html>

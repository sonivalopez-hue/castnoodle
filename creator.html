<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAST NOODLES CREATOR - Like Flixlit - No PIN</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background:#080a12;color:white" class="min-h-screen">
<div class="bg-[#12131f] border-b border-white/10 p-4 flex justify-between items-center sticky top-0 z-40">
<div><b style="color:#e50914">CAST NOODLES</b> CREATOR <span class="text-[10px] bg-green-500 text-black px-2 py-1 rounded-full font-bold">FREE+VIP</span> <span id="blobInfo" class="text-[10px] ml-2 bg-white/10 px-2 py-1 rounded-full">Loading...</span></div>
<div class="flex gap-2"><button onclick="openMain()" class="bg-white text-black px-5 py-2 rounded-full text-xs font-bold">View Main</button><button onclick="forcePush()" class="bg-yellow-400 text-black px-5 py-2 rounded-full text-xs font-black">Force Push</button></div>
</div>
<div class="max-w-7xl mx-auto p-4 grid lg:grid-cols-3 gap-6">
<div class="bg-[#151821] rounded-2xl p-5 border border-white/10 h-fit">
<h2 class="font-bold mb-4">Upload Video - Free or VIP Pay</h2>
<div class="flex gap-2 mb-3"><button id="typeMovieBtn" onclick="setType('movie')" class="flex-1 py-2 rounded-full text-xs font-bold bg-white text-black">Movie</button><button id="typeSeriesBtn" onclick="setType('series')" class="flex-1 py-2 rounded-full text-xs bg-white/10">Series</button></div>
<input id="title" placeholder="Title * e.g Rice Noodles Cooking" class="w-full bg-black border border-white/10 rounded-full px-4 py-3 mb-2 text-sm">
<div class="flex gap-2 mb-2"><input id="year" placeholder="Year" class="w-1/2 bg-black border border-white/10 rounded-full px-4 py-3 text-sm"><select id="genre" class="w-1/2 bg-black border border-white/10 rounded-full px-4 py-3 text-sm"><option>Comedy</option><option>Action</option><option>Nollywood</option><option>Cooking</option><option>Cast Noodles</option></select></div>
<textarea id="desc" placeholder="Description" class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 mb-2 text-sm"></textarea>
<p class="text-[10px] text-white/60 mb-1">POSTER *</p><input id="posterFile" type="file" accept="image/*" class="w-full text-xs mb-2"><div id="posterPreview" class="hidden"><img id="posterImg" class="w-full h-40 object-cover rounded-xl mb-2"></div>
<p class="text-[10px] text-yellow-400 mb-1">VIDEO LINK * Permanent - Telegram @getpubliclink_bot</p><input id="videoLink" placeholder="https:// permanent link" class="w-full bg-black border border-yellow-500/20 rounded-full px-4 py-3 text-xs mb-2">
<div class="flex gap-2 mb-3"><label class="flex-1 bg-black/40 p-3 rounded-xl border border-white/5 cursor-pointer flex items-center gap-2"><input id="freeCheck" type="radio" name="vip" checked onchange="toggleVip()"><span class="text-xs font-bold">FREE - Watch Free</span></label><label class="flex-1 bg-yellow-400/10 p-3 rounded-xl border border-yellow-500/20 cursor-pointer flex items-center gap-2"><input id="vipCheck" type="radio" name="vip" onchange="toggleVip()"><span class="text-xs font-black text-yellow-400">VIP - Pay Before Watch</span></label></div>
<div id="seriesBox" class="hidden bg-black/40 p-3 rounded-xl mb-2"><div class="flex gap-2 mb-2"><input id="epTitle" placeholder="Ep Title" class="flex-1 bg-[#0f121e] border border-white/10 rounded-full px-3 py-2 text-xs"><input id="epLink" placeholder="Link" class="flex-1 bg-[#0f121e] border border-white/10 rounded-full px-3 py-2 text-xs"></div><button onclick="addEp()" class="w-full bg-white/10 py-2 rounded-full text-xs">+ Add Episode</button><div id="epList" class="mt-2 space-y-1"></div></div>
<button id="publishBtn" onclick="publish()" class="w-full bg-[#e50914] py-3 rounded-full font-bold">Publish to Cast Noodles</button>
</div>
<div class="lg:col-span-2 bg-[#151821] rounded-2xl p-5 border border-white/10"><div class="flex justify-between mb-4"><b>Live Videos</b><span id="count" class="text-xs bg-white/10 px-2 py-1 rounded-full">0</span></div><div id="movieList" class="space-y-2 max-h-[700px] overflow-auto"></div></div>
</div>
<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full font-bold z-50"></div>
<script>
let blobId=localStorage.getItem('castnoodles_blobId')||"1400000000000000001"; let allMovies=[]; let posterBase64=""; let currentType='movie'; let episodes=[];
function openMain(){ let h=window.location.hostname; if(h.includes('github.io')){ let p=window.location.pathname; let b=p.substring(0,p.lastIndexOf('/')+1); window.open(window.location.origin+b,'_blank'); } else { window.open('castnoodles-main.html','_blank'); } }
function setType(t){currentType=t; document.getElementById('typeMovieBtn').className=t=='movie'?'flex-1 py-2 rounded-full text-xs font-bold bg-white text-black':'flex-1 py-2 rounded-full text-xs bg-white/10'; document.getElementById('typeSeriesBtn').className=t=='series'?'flex-1 py-2 rounded-full text-xs font-bold bg-white text-black':'flex-1 py-2 rounded-full text-xs bg-white/10'; document.getElementById('seriesBox').classList.toggle('hidden', t!='series'); }
function toggleVip(){}
function addEp(){let t=document.getElementById('epTitle').value.trim()||'Episode '+(episodes.length+1); let l=document.getElementById('epLink').value.trim(); if(!l){toast('Paste link');return;} episodes.push({title:t, video:l}); document.getElementById('epTitle').value=''; document.getElementById('epLink').value=''; renderEpisodes();}
function renderEpisodes(){document.getElementById('epList').innerHTML=episodes.map((e,i)=>`<div class="bg-black/40 p-2 rounded flex justify-between text-xs"><span>${e.title}</span><button onclick="episodes.splice(${i},1);renderEpisodes()" class="text-red-400">Del</button></div>`).join('');}
async function init(){document.getElementById('blobInfo').innerText='Blob: '+blobId.slice(-6); await load();}
async function load(){try{let res=await fetch('https://jsonblob.com/api/jsonBlob/'+blobId); if(res.ok){let data=await res.json(); if(Array.isArray(data)) allMovies=data;}}catch(e){} renderList();}
async function save(){try{await fetch('https://jsonblob.com/api/jsonBlob/'+blobId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(allMovies)}); localStorage.setItem('castnoodles_backup',JSON.stringify(allMovies));}catch(e){localStorage.setItem('castnoodles_backup',JSON.stringify(allMovies));}}
async function createNewBlob(data){try{let res=await fetch('https://jsonblob.com/api/jsonBlob',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); let loc=res.headers.get('location')||res.headers.get('Location'); if(loc){let id=loc.split('/').pop(); localStorage.setItem('castnoodles_blobId',id); blobId=id; document.getElementById('blobInfo').innerText='Blob: '+id.slice(-6); return id;}}catch(e){toast('Blob error');} return null;}
async function forcePush(){if(!confirm('Force push '+allMovies.length+' videos to NEW blob? Fix Main!'))return; let nid=await createNewBlob(allMovies); if(nid){await save(); toast('Force pushed to '+nid);}}
function renderList(){document.getElementById('count').innerText=allMovies.length+' videos'; document.getElementById('movieList').innerHTML=allMovies.map((m,i)=>`<div class="bg-black/40 p-3 rounded-xl flex gap-3"><div class="w-16 h-16 bg-gradient-to-br from-red-600 to-orange-600 rounded-lg flex items-center justify-center font-black overflow-hidden">${m.poster?`<img src="${m.poster}" class="w-full h-full object-cover">`:m.title[0]}</div><div class="flex-1"><p class="font-bold text-sm">${m.title} ${m.vip?'<span class="bg-yellow-400 text-black text-[9px] px-2 py-0.5 rounded-full">VIP PAY</span>':'<span class="bg-green-500 text-black text-[9px] px-2 py-0.5 rounded-full">FREE</span>'}</p><p class="text-xs text-white/50">${m.year} • ${m.genre}</p></div><button onclick="delMovie(${i})" class="bg-red-500/20 px-2 py-1 rounded-full text-[10px]">Del</button></div>`).join('')||'<p class="text-white/30 text-xs">No videos</p>';}
async function publish(){let title=document.getElementById('title').value.trim(); let year=document.getElementById('year').value.trim()||'2024'; let genre=document.getElementById('genre').value; let desc=document.getElementById('desc').value.trim(); let videoLink=document.getElementById('videoLink').value.trim(); let isVip=document.getElementById('vipCheck').checked; if(!title||!posterBase64){toast('Need title and poster');return;} if(currentType=='movie'&&!videoLink){toast('Paste video link');return;} if(currentType=='series'&&episodes.length==0){toast('Add episodes');return;} document.getElementById('publishBtn').disabled=true; document.getElementById('publishBtn').innerText='Publishing...'; try{try{let res=await fetch('https://jsonblob.com/api/jsonBlob/'+blobId); if(res.ok){let cur=await res.json(); if(Array.isArray(cur)&&cur.length>allMovies.length) allMovies=cur;}}catch(e){} let newMovie; if(currentType=='movie'){newMovie={id:Date.now(),title,year,genre,desc,type:'movie',poster:posterBase64,video:videoLink,vip:isVip,color:'from-red-600 to-orange-600'};} else {newMovie={id:Date.now(),title,year,genre,desc,type:'series',poster:posterBase64,episodes:episodes,vip:isVip,color:'from-red-600 to-orange-600'};} allMovies.unshift(newMovie); await save(); toast(isVip?'VIP Pay Published!':'Free Published!'); renderList(); document.getElementById('title').value=''; document.getElementById('videoLink').value=''; posterBase64=''; document.getElementById('posterPreview').classList.add('hidden'); episodes=[]; renderEpisodes();}catch(e){toast('Error '+e);} document.getElementById('publishBtn').disabled=false; document.getElementById('publishBtn').innerText='Publish to Cast Noodles';}
document.getElementById('posterFile').addEventListener('change', e=>{let f=e.target.files[0]; if(!f) return; let r=new FileReader(); r.onload=ev=>{let img=new Image(); img.onload=function(){let c=document.createElement('canvas'); let maxW=400; let scale=maxW/img.width; c.width=maxW; c.height=img.height*scale; c.getContext('2d').drawImage(img,0,0,c.width,c.height); posterBase64=c.toDataURL('image/jpeg',0.6); document.getElementById('posterImg').src=posterBase64; document.getElementById('posterPreview').classList.remove('hidden');}; img.src=ev.target.result;}; r.readAsDataURL(f);});
function delMovie(i){if(confirm('Delete?')){allMovies.splice(i,1); save(); renderList();}}
function toast(m){let t=document.getElementById('toast'); t.innerText=m; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),4000);}
init();
</script>
</body></html>
